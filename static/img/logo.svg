<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f3ff"/>
      <stop offset="100%" style="stop-color:#bc13fe"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="240" height="240" rx="40" fill="#030305"/>
  <circle cx="120" cy="120" r="90" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.2"/>
  <circle cx="120" cy="120" r="60" fill="none" stroke="url(#g2)" stroke-width="1" opacity="0.3" stroke-dasharray="4 4"/>
  <ellipse cx="120" cy="120" rx="75" ry="20" fill="none" stroke="url(#g1)" stroke-width="0.8" opacity="0.15" transform="rotate(-30 120 120)"/>
  <text x="120" y="125" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="64" font-weight="700" fill="url(#g1)" filter="url(#glow)">CV</text>
  <text x="120" y="160" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#888" letter-spacing="6">ARCHITECT</text>
</svg>
